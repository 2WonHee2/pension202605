function parseWon(value) {
  const number = Number(String(value).replace(/[^0-9]/g, ""));
  return Number.isFinite(number) ? number : 0;
}

function formatFeeSum(baseFee, extraFee) {
  return (parseWon(baseFee) + parseWon(extraFee)).toLocaleString();
}

function runTests() {

  console.assert(formatFeeSum(stays.pension1.baseFee, stays.pension1.extraFee) === "330,000", "TEST: 화도1 기준+추가 계산값 확인");
  console.assert(Object.values(stays).every((stay) => stay.images.length === 1), "TEST: 각 숙소 대표사진은 1장만 사용");
}
