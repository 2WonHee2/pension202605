function PhotoAlbum({ stay }) {
  const [isOpen, setIsOpen] = useState(false);
  const [selectedIndex, setSelectedIndex] = useState(0);
  const placeholders = ["대표 사진", "실내 사진", "객실 사진", "수영장/마당", "전망 사진"];
  const albumItems = placeholders.map((label, index) => ({ label, src: stay.images?.[index] || null }));
  const allImageItems = stay.images?.length ? stay.images.map((src, index) => ({ label: `사진 ${index + 1}`, src })) : albumItems;
  const selectedImage = allImageItems[selectedIndex] || allImageItems[0];
  const movePhoto = (direction) => {
    setSelectedIndex((prev) => {
      const total = allImageItems.length;
      if (!total) return 0;
      return (prev + direction + total) % total;
    });
  };

  return (
    <div className="grid h-auto gap-2 md:h-[420px] md:gap-3 md:grid-cols-2">
      <div className="h-64 overflow-hidden rounded-t-3xl bg-gradient-to-br from-blue-100 via-sky-50 to-indigo-100 md:h-auto md:rounded-l-3xl md:rounded-tr-none">
        {albumItems[0].src ? <img src={albumItems[0].src} alt={albumItems[0].label} className="h-full w-full object-cover" /> :
          <div className="flex h-full items-center justify-center text-3xl font-black text-slate-600">{stay.title}</div>}
      </div>

      <div className="grid grid-cols-2 gap-2 md:gap-3">
        {albumItems.slice(1).map((item, idx) => (
          <div key={idx} className="relative h-28 overflow-hidden bg-slate-100 last:rounded-br-3xl first:rounded-tr-none md:h-auto md:first:rounded-tr-3xl">
            {item.src ? <img src={item.src} alt={item.label} className="h-full w-full object-cover" /> :
              <div className="flex h-full items-center justify-center bg-gradient-to-br from-slate-100 to-slate-200 text-sm font-bold text-slate-500">{item.label}</div>}
            {idx === 3 && (
              <button onClick={() => { setSelectedIndex(0); setIsOpen(true); }}
                className="absolute bottom-2 right-2 rounded-full bg-white px-3 py-2 text-xs font-bold text-slate-800 shadow-lg transition hover:scale-105 md:bottom-4 md:right-4 md:px-4 md:text-sm">
                🖼️ 전체 사진 보기
              </button>
            )}
          </div>
        ))}
      </div>

      {isOpen && (
        <div className="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-black/70 p-3 md:p-6" onClick={() => setIsOpen(false)}>
          <div className="mt-4 mb-4 max-w-5xl w-full rounded-3xl bg-white p-4 md:p-6" onClick={(e) => e.stopPropagation()}>
            <div className="mb-4 flex items-center justify-between">
              <h3 className="text-2xl font-black text-slate-900">전체 사진 보기</h3>
              <button onClick={() => setIsOpen(false)} className="rounded-xl bg-slate-100 px-4 py-2 font-bold">닫기</button>
            </div>

            <div className="relative mb-6 overflow-hidden rounded-3xl bg-slate-100">
              {selectedImage?.src ? <img src={selectedImage.src} alt={selectedImage.label} className="h-[280px] w-full object-contain bg-black md:h-[500px]" /> :
                <div className="flex h-[280px] items-center justify-center text-2xl font-bold text-slate-500 md:h-[500px]">사진을 선택하세요</div>}

              {allImageItems.length > 1 && (
                <>
                  <button
                    type="button"
                    onClick={() => movePhoto(-1)}
                    className="absolute left-3 top-1/2 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/40 bg-black/45 text-3xl font-black text-white shadow-lg transition hover:scale-110 hover:bg-black/65 md:left-5 md:h-14 md:w-14"
                    aria-label="이전 사진"
                  >
                    ‹
                  </button>
                  <button
                    type="button"
                    onClick={() => movePhoto(1)}
                    className="absolute right-3 top-1/2 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/40 bg-black/45 text-3xl font-black text-white shadow-lg transition hover:scale-110 hover:bg-black/65 md:right-5 md:h-14 md:w-14"
                    aria-label="다음 사진"
                  >
                    ›
                  </button>
                </>
              )}
            </div>

            <div className="grid grid-cols-2 gap-4 md:grid-cols-5">
              {allImageItems.map((item, idx) => (
                <div key={idx} onClick={() => setSelectedIndex(idx)}
                  className={`h-20 md:h-28 cursor-pointer overflow-hidden rounded-2xl bg-slate-100 border-4 transition ${selectedImage?.label === item.label ? "border-blue-500" : "border-transparent"}`}>
                  {item.src ? <img src={item.src} alt={item.label} className="h-full w-full object-cover" /> :
                    <div className="flex h-full items-center justify-center text-sm font-bold text-slate-500">{item.label}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <button type="button" onClick={() => {

            a.href = stay.link;
            a.target = "_blank";

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            숙소 사이트로 이동 →
          </button>
        </div>

        <div className="rounded-2xl bg-slate-50 p-4 text-sm leading-6 text-slate-700 md:p-5 md:text-base md:leading-7">
          <div className="flex items-center gap-2">📍 위치: {stay.location}</div>
          <div className="mt-3 flex items-center gap-2">🕒 입실: {stay.checkIn} / 퇴실: {stay.checkOut}</div>
          <div className="mt-3 flex items-center gap-2">👥 숙소비용: {stay.people}</div>
          <div className="mt-3 flex items-center gap-2">🔥 바베큐 금액: {stay.bbq.summaryPrice}</div>
          <div className="mt-3 flex items-center gap-2">⭐ 총 가격(1박): {stay.price}</div>

          <h3 className="font-bold text-rose-700">바베큐 시설</h3>
          <div className="mt-3 space-y-2 text-sm text-slate-700 md:text-base">
            <div>🕒 이용 시간: {stay.bbq.time}</div>
            <div>💰 이용 금액: {stay.bbq.price}</div>

          </div>
        </div>

        <div className="mb-5 rounded-2xl bg-amber-50 p-4 md:p-5">
          <h3 className="font-bold text-amber-700">특이사항</h3>
          <ul className="mt-3 space-y-2 text-sm text-slate-700 md:text-base">
            {stay.notes.map((item) => <li key={item}>• {item}</li>)}
          </ul>
        </div>

        <div className="rounded-2xl bg-slate-50 p-4 md:p-5">
          <h3 className="font-bold text-slate-800">시설/서비스</h3>
          <div className="mt-4 grid grid-cols-2 gap-y-3 text-sm text-slate-700 md:grid-cols-4 md:text-base">
            {stay.services.map((item) => <div key={item} className="flex items-center gap-2"><span>✓</span><span>{item}</span></div>)}
          </div>
        </div>
      </div>
    </div>
  );
}
